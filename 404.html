<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Nazeer Haider</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }
    .error-code {
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-mono);
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 0 20px var(--accent-glow);
    }
    .error-message {
      font-size: 1.5rem;
      color: var(--highlight);
      font-family: var(--font-heading);
      margin-bottom: 20px;
    }
    .error-desc {
      color: var(--text-secondary);
      max-width: 500px;
      margin-bottom: 40px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <div class="error-message">Oops! You've navigated off the campus map.</div>
  <p class="error-desc">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back to the main lab!</p>
  <a href="/" class="btn-primary-custom" style="padding: 15px 30px; font-size: 1.1rem; text-decoration: none;">
    <i class="fa-solid fa-house"></i> Return to Home
  </a>

  <script src="js/app.js"></script>
</body>
</html>
